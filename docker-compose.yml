services:
  bmw-cardata-bridge:
    image: ghcr.io/wiesty/bmw-cardata-bridge:latest
    container_name: bmw-cardata-bridge
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - BMW_CLIENT_ID=your-client-id-here
      - REST_PORT=8080
      - POLL_INTERVAL_MINUTES=30
    volumes:
      - bmw_data:/data

volumes:
  bmw_data:
